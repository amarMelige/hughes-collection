<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hughes Estate — Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1A1714;
  --bg2: #211E1B;
  --bg3: #2A2622;
  --card: #242018;
  --card2: #2E2A25;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --gold: #C9A84C;
  --gold2: #E8C96B;
  --gold3: #F5DFA0;
  --gold-dim: rgba(201,168,76,0.12);
  --text: #F0EBE3;
  --text2: #A89F94;
  --text3: #6B635A;
  --green: #4A8C62;
  --green-light: rgba(74,140,98,0.15);
  --red: #8C4A4A;
  --red-light: rgba(140,74,74,0.15);
  --blue: #4A6E8C;
  --blue-light: rgba(74,110,140,0.15);
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

/* ── HEADER ── */
.site-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;gap:24px;height:64px;position:sticky;top:0;z-index:100}
.header-logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold2);letter-spacing:0.5px;white-space:nowrap}
.header-logo span{color:var(--text3);font-style:italic;font-size:14px;font-family:'Source Sans 3',sans-serif;margin-left:8px}
.header-spacer{flex:1}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;width:260px;transition:border-color 0.2s}
.search-box:focus-within{border-color:var(--gold)}
.search-box svg{width:14px;height:14px;color:var(--text3);flex-shrink:0}
.search-box input{background:none;border:none;outline:none;font-size:13.5px;color:var(--text);font-family:'Source Sans 3',sans-serif;width:100%}
.search-box input::placeholder{color:var(--text3)}
.view-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.vt-btn{padding:7px 12px;border:none;background:none;cursor:pointer;color:var(--text3);transition:all 0.15s;display:flex;align-items:center}
.vt-btn svg{width:15px;height:15px}
.vt-btn.active{background:var(--gold-dim);color:var(--gold2)}

/* ── LAYOUT ── */
.page{display:flex;min-height:calc(100vh - 64px)}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.nav-section{padding:0 12px;margin-bottom:8px}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:0 8px;margin-bottom:6px;font-weight:600}
.nav-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 10px;border-radius:6px;border:none;background:none;cursor:pointer;color:var(--text2);font-size:13px;font-family:'Source Sans 3',sans-serif;text-align:left;transition:all 0.15s}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--gold-dim);color:var(--gold2)}
.nav-btn .count{font-size:11px;background:var(--bg3);padding:1px 7px;border-radius:10px;color:var(--text3)}
.nav-btn.active .count{background:rgba(201,168,76,0.2);color:var(--gold)}
.nav-divider{height:1px;background:var(--border);margin:12px 20px}
.value-summary{padding:16px 20px;margin:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius)}
.value-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:4px}
.value-num{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold2)}
.value-range{font-size:11px;color:var(--text3);margin-top:2px}

/* ── MAIN ── */
.main-content{flex:1;padding:24px;overflow:hidden}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.section-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--text);letter-spacing:-0.3px}
.section-count{font-size:13px;color:var(--text3)}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fchip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);font-family:'Source Sans 3',sans-serif;transition:all 0.15s;white-space:nowrap}
.fchip:hover{border-color:var(--border2);color:var(--text)}
.fchip.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold2)}
select.sort-sel{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);font-size:12.5px;font-family:'Source Sans 3',sans-serif;color:var(--text2);cursor:pointer;outline:none}

/* ── STATS STRIP ── */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:6px;font-weight:600}
.stat-val{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);letter-spacing:-0.3px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.stat-val.gold{color:var(--gold2)}

/* ── GRID VIEW ── */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative}
.item-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.card-img{height:170px;background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-img-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text3)}
.card-img-placeholder svg{width:40px;height:40px;opacity:0.3}
.card-img-placeholder span{font-size:11px;letter-spacing:1px;text-transform:uppercase}
.card-type-badge{position:absolute;top:10px;left:10px;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.badge-gun{background:rgba(201,168,76,0.2);color:var(--gold2);border:1px solid rgba(201,168,76,0.3)}
.badge-vehicle{background:var(--blue-light);color:#7AAED4;border:1px solid rgba(74,110,140,0.3)}
.card-body{padding:14px 16px}
.card-make{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.card-model{font-size:15px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:6px}
.card-desc{font-size:12.5px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.card-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:10px}
.card-cal{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:4px;font-family:'Source Code Pro',monospace}
.card-val{font-size:13px;font-weight:600;color:var(--gold)}
.card-id{position:absolute;top:10px;right:10px;font-size:10px;font-family:'Source Code Pro',monospace;color:var(--text3);background:rgba(0,0,0,0.4);padding:2px 6px;border-radius:3px}

/* ── LIST VIEW ── */
.items-list{display:flex;flex-direction:column;gap:1px;background:var(--border)}
.list-header{display:grid;grid-template-columns:50px 1fr 140px 100px 100px 110px;gap:0;background:var(--bg2);padding:9px 16px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-weight:600;cursor:pointer}
.list-header span:hover{color:var(--text2)}
.list-row{display:grid;grid-template-columns:50px 1fr 140px 100px 100px 110px;gap:0;background:var(--card);padding:12px 16px;align-items:center;cursor:pointer;transition:background 0.12s}
.list-row:hover{background:var(--card2)}
.list-num{font-family:'Source Code Pro',monospace;font-size:12px;color:var(--text3)}
.list-info{}
.list-make{font-size:11px;color:var(--text3)}
.list-model{font-size:13.5px;font-weight:500;color:var(--text)}
.list-cal{font-family:'Source Code Pro',monospace;font-size:12px;color:var(--text2)}
.list-serial{font-family:'Source Code Pro',monospace;font-size:11.5px;color:var(--text3)}
.list-type span{font-size:11px;font-weight:600;letter-spacing:0.5px;padding:2px 8px;border-radius:4px}
.list-val{font-size:13px;font-weight:600;color:var(--gold);text-align:right}

/* ── DETAIL MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,8,6,0.75);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;padding:20px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:600px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);transform:scale(0.97);transition:transform 0.2s}
.modal-overlay.open .modal{transform:scale(1)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.modal-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);position:relative}
.modal-num{font-family:'Source Code Pro',monospace;font-size:11px;color:var(--text3);margin-bottom:4px}
.modal-make{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:6px}
.modal-model{font-family:'Playfair Display',serif;font-size:26px;color:var(--text);letter-spacing:-0.3px;line-height:1.2}
.modal-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-body{padding:24px 28px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.detail-item{}
.detail-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:4px;font-weight:600}
.detail-val{font-size:14px;color:var(--text);font-weight:500}
.detail-val.mono{font-family:'Source Code Pro',monospace;font-size:13px}
.val-range-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;display:flex;gap:32px;align-items:center}
.vrb-item{text-align:center}
.vrb-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:4px}
.vrb-val{font-family:'Playfair Display',serif;font-size:22px}
.vrb-val.low{color:var(--text2)}
.vrb-val.mid{color:var(--gold2)}
.vrb-val.high{color:var(--gold3)}
.notes-box{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 var(--radius) var(--radius) 0;padding:14px 16px;font-size:13px;color:var(--text2);line-height:1.7}

/* ── EMPTY ── */
.empty{text-align:center;padding:64px 20px;color:var(--text3)}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:0.3}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.item-card,.list-row{animation:fadeUp 0.3s ease both}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{display:none}
  .stats-strip{grid-template-columns:1fr 1fr}
  .list-header,.list-row{grid-template-columns:40px 1fr 100px 90px}
}
@media(max-width:600px){
  .site-header{padding:0 16px}
  .search-box{width:180px}
  .main-content{padding:16px}
  .stats-strip{grid-template-columns:1fr 1fr}
  .detail-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-logo">Hughes Estate <span>Private Collection</span></div>
  <div class="header-spacer"></div>
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Search make, model, caliber…" oninput="render()">
  </div>
  <div class="view-toggle">
    <button class="vt-btn active" id="btn-grid" onclick="setView('grid')" title="Grid view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <button class="vt-btn" id="btn-list" onclick="setView('list')" title="List view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
  </div>
</header>

<div class="page">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="nav-section">
    <div class="nav-label">Categories</div>
    <button class="nav-btn active" onclick="setType('all',this)">
      All Items <span class="count" id="cnt-all">0</span>
    </button>
    <button class="nav-btn" onclick="setType('Gun',this)">
      Firearms <span class="count" id="cnt-gun">0</span>
    </button>
    <button class="nav-btn" onclick="setType('Vehicle',this)">
      Vehicles <span class="count" id="cnt-vehicle">0</span>
    </button>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-section">
    <div class="nav-label">Firearms Type</div>
    <button class="nav-btn" onclick="setSubtype('Pistol',this)">Pistols <span class="count" id="cnt-pistol">0</span></button>
    <button class="nav-btn" onclick="setSubtype('Revolver',this)">Revolvers <span class="count" id="cnt-revolver">0</span></button>
    <button class="nav-btn" onclick="setSubtype('Rifle',this)">Rifles <span class="count" id="cnt-rifle">0</span></button>
    <button class="nav-btn" onclick="setSubtype('Shotgun',this)">Shotguns <span class="count" id="cnt-shotgun">0</span></button>
    <button class="nav-btn" onclick="setSubtype('Air',this)">Air Guns <span class="count" id="cnt-air">0</span></button>
    <button class="nav-btn" onclick="setSubtype('Black Powder',this)">Black Powder <span class="count" id="cnt-bp">0</span></button>
  </div>
  <div class="nav-divider"></div>
  <div class="value-summary">
    <div class="value-label">Collection Value</div>
    <div class="value-num" id="sidebar-total">—</div>
    <div class="value-range" id="sidebar-range">Low – High estimate</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main-content">
  <!-- STATS -->
  <div class="stats-strip">
    <div class="stat">
      <div class="stat-lbl">Total Items</div>
      <div class="stat-val" id="s-total">49</div>
      <div class="stat-sub">Firearms + Vehicles</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Firearms</div>
      <div class="stat-val" id="s-guns">43</div>
      <div class="stat-sub">Across all categories</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Est. Value (Mid)</div>
      <div class="stat-val gold" id="s-value">—</div>
      <div class="stat-sub">Average of low/high</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">High Estimate</div>
      <div class="stat-val gold" id="s-high">—</div>
      <div class="stat-sub">Best-case total</div>
    </div>
  </div>

  <!-- SECTION HEAD -->
  <div class="section-head">
    <div>
      <div class="section-title" id="section-title">Full Collection</div>
      <div class="section-count" id="section-count"></div>
    </div>
    <div class="filter-row">
      <select class="sort-sel" id="sort-sel" onchange="render()">
        <option value="id">Sort: Item #</option>
        <option value="make">Sort: Make A–Z</option>
        <option value="val_high">Sort: Value High–Low</option>
        <option value="val_low">Sort: Value Low–High</option>
        <option value="model">Sort: Model A–Z</option>
      </select>
    </div>
  </div>

  <!-- ITEMS -->
  <div id="items-container"></div>
</main>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>

// ── STATE ──
let activeType = 'all';
let activeSubtype = null;
let viewMode = 'grid';
let sortMode = 'id';

function fmt$(n){return '$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0})}
function fmtMid(item){return fmt$(Math.round((item.val_low+item.val_high)/2))}

function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  return ITEMS.filter(item=>{
    if(activeType!=='all' && item.type!==activeType) return false;
    if(activeSubtype){
      const s = activeSubtype.toLowerCase();
      if(s==='pistol' && item.subtype!=='Pistol') return false;
      if(s==='revolver' && item.subtype!=='Revolver') return false;
      if(s==='rifle' && !['Rifle'].includes(item.subtype)) return false;
      if(s==='shotgun' && item.subtype!=='Shotgun') return false;
      if(s==='air' && item.subtype!=='Air') return false;
      if(s==='black powder' && item.subtype!=='Black Powder') return false;
    }
    if(q && !`${item.make} ${item.model} ${item.caliber} ${item.desc} ${item.serial}`.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>{
    if(sortMode==='id') return a.id.localeCompare(b.id);
    if(sortMode==='make') return a.make.localeCompare(b.make);
    if(sortMode==='val_high') return b.val_high-a.val_high;
    if(sortMode==='val_low') return a.val_low-b.val_low;
    if(sortMode==='model') return a.model.localeCompare(b.model);
    return 0;
  });
}

function render(){
  sortMode = document.getElementById('sort-sel').value;
  const items = getFiltered();

  // Update counts
  document.getElementById('cnt-all').textContent = ITEMS.length;
  document.getElementById('cnt-gun').textContent = ITEMS.filter(i=>i.type==='Gun').length;
  document.getElementById('cnt-vehicle').textContent = ITEMS.filter(i=>i.type==='Vehicle').length;
  document.getElementById('cnt-pistol').textContent = ITEMS.filter(i=>i.subtype==='Pistol').length;
  document.getElementById('cnt-revolver').textContent = ITEMS.filter(i=>i.subtype==='Revolver').length;
  document.getElementById('cnt-rifle').textContent = ITEMS.filter(i=>i.subtype==='Rifle').length;
  document.getElementById('cnt-shotgun').textContent = ITEMS.filter(i=>i.subtype==='Shotgun').length;
  document.getElementById('cnt-air').textContent = ITEMS.filter(i=>i.subtype==='Air').length;
  document.getElementById('cnt-bp').textContent = ITEMS.filter(i=>i.subtype==='Black Powder').length;

  // Stats
  const allGuns = ITEMS.filter(i=>i.type==='Gun');
  const totalLow = ITEMS.reduce((s,i)=>s+i.val_low,0);
  const totalHigh = ITEMS.reduce((s,i)=>s+i.val_high,0);
  const totalMid = Math.round((totalLow+totalHigh)/2);
  document.getElementById('s-total').textContent = ITEMS.length;
  document.getElementById('s-guns').textContent = allGuns.length;
  document.getElementById('s-value').textContent = fmt$(totalMid);
  document.getElementById('s-high').textContent = fmt$(totalHigh);
  document.getElementById('sidebar-total').textContent = fmt$(totalMid);
  document.getElementById('sidebar-range').textContent = fmt$(totalLow)+' – '+fmt$(totalHigh);

  // Section info
  document.getElementById('section-count').textContent = items.length+' item'+(items.length!==1?'s':'');

  const container = document.getElementById('items-container');

  if(items.length===0){
    container.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><div>No items match your search</div></div>`;
    return;
  }

  if(viewMode==='grid'){
    container.innerHTML = `<div class="items-grid">${items.map((item,i)=>cardHTML(item,i)).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="items-list">
      <div class="list-header">
        <span>#</span><span>Item</span><span>Caliber / Year</span><span>Serial</span><span>Type</span><span style="text-align:right">Value</span>
      </div>
      ${items.map((item,i)=>rowHTML(item,i)).join('')}
    </div>`;
  }
}

function cardHTML(item,i){
  const badge = item.type==='Gun'?'badge-gun':'badge-vehicle';
  const label = item.type==='Gun'?'Firearm':'Vehicle';
  const delay = Math.min(i*0.04,0.5);
  return `<div class="item-card" onclick="showDetail('${item.id}')" style="animation-delay:${delay}s">
    <div class="card-img">
      <div class="card-img-placeholder">
        ${item.type==='Gun'?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2 12h3l2-4h10l2 4h1v3h-2v1h-2v-1H8v1H6v-1H4v-3z"/></svg>`:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`}
        <span>${item.make}</span>
      </div>
      <span class="badge ${badge} card-type-badge">${item.subtype||label}</span>
      <span class="card-id">${item.id}</span>
    </div>
    <div class="card-body">
      <div class="card-make">${item.make}</div>
      <div class="card-model">${item.model}</div>
      <div class="card-desc">${item.desc}</div>
      <div class="card-footer">
        <span class="card-cal">${item.caliber}</span>
        <span class="card-val">${fmt$(item.val_low)} – ${fmt$(item.val_high)}</span>
      </div>
    </div>
  </div>`;
}

function rowHTML(item,i){
  const badge = item.type==='Gun'?'badge-gun':'badge-vehicle';
  const delay = Math.min(i*0.025,0.5);
  return `<div class="list-row" onclick="showDetail('${item.id}')" style="animation-delay:${delay}s">
    <div class="list-num">${item.id}</div>
    <div class="list-info">
      <div class="list-make">${item.make}</div>
      <div class="list-model">${item.model}</div>
    </div>
    <div class="list-cal">${item.caliber}</div>
    <div class="list-serial">${item.serial}</div>
    <div class="list-type"><span class="${badge}">${item.subtype||item.type}</span></div>
    <div class="list-val">${fmt$(item.val_low)}–${fmt$(item.val_high)}</div>
  </div>`;
}

function showDetail(id){
  const item = ITEMS.find(i=>i.id===id);
  if(!item) return;
  const badge = item.type==='Gun'?'badge-gun':'badge-vehicle';
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-num">Item #${item.id} · Serial: ${item.serial}</div>
      <div class="modal-make">${item.make}</div>
      <div class="modal-model">${item.model}</div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="val-range-box">
        <div class="vrb-item"><div class="vrb-label">Est. Low</div><div class="vrb-val low">${fmt$(item.val_low)}</div></div>
        <div class="vrb-item"><div class="vrb-label">Mid Estimate</div><div class="vrb-val mid">${fmtMid(item)}</div></div>
        <div class="vrb-item"><div class="vrb-label">Est. High</div><div class="vrb-val high">${fmt$(item.val_high)}</div></div>
      </div>
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-label">Make / Manufacturer</div><div class="detail-val">${item.make}</div></div>
        <div class="detail-item"><div class="detail-label">Model</div><div class="detail-val">${item.model}</div></div>
        <div class="detail-item"><div class="detail-label">Caliber / Year</div><div class="detail-val mono">${item.caliber}</div></div>
        <div class="detail-item"><div class="detail-label">Serial Number</div><div class="detail-val mono">${item.serial}</div></div>
        <div class="detail-item"><div class="detail-label">Type</div><div class="detail-val"><span class="badge ${badge}" style="font-size:12px">${item.subtype||item.type}</span></div></div>
        <div class="detail-item"><div class="detail-label">Item #</div><div class="detail-val mono">${item.id}</div></div>
      </div>
      <div class="detail-item" style="margin-bottom:12px"><div class="detail-label" style="margin-bottom:6px">Description</div><div class="detail-val" style="font-size:14px;color:var(--text2)">${item.desc}</div></div>
      ${item.notes?`<div class="notes-box">${item.notes}</div>`:''}
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open')}

function setView(v){
  viewMode=v;
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  render();
}

function setType(t,btn){
  activeType=t; activeSubtype=null;
  document.querySelectorAll('.sidebar .nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const titles={all:'Full Collection',Gun:'Firearms',Vehicle:'Vehicles'};
  document.getElementById('section-title').textContent = titles[t]||t;
  render();
}

function setSubtype(s,btn){
  activeType='Gun'; activeSubtype=s;
  document.querySelectorAll('.sidebar .nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-title').textContent = s+' Collection';
  render();
}

// Init
render();
</script>
